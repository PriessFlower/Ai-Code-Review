name: Run Java Git Diff By Local

on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 2  # 检出最后两个提交，以便可以比较 HEAD~1 和 HEAD

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'  # 你可以选择其他发行版，如 'adopt' 或 'zulu'
          java-version: '21'
          cache: 'maven'

      - name: Run AI Code Review via Maven
        env:
          GITHUB_TOKEN: ${{ secrets.CODE_TOKEN }}
        run: mvn clean compile exec:java -Dexec.mainClass="cn.zt.middleware.AiCodeReview"

