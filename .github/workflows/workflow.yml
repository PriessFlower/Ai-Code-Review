name: Build, Review and Release

on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  build-review-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许创建 GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 检出最后两个提交，用于 git diff HEAD~1 HEAD

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build fat jar
        run: mvn clean package -DskipTests -pl ai-code-review-app -am

      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.CODE_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
          WECHAT_TO_USER: ${{ secrets.WECHAT_TO_USER }}
        run: java -jar ai-code-review-app/target/ai-code-review-app-1.0-SNAPSHOT.jar

      - name: Publish SDK to GitHub Releases
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "Auto-release from commit ${{ github.sha }}"
          files: ai-code-review-app/target/ai-code-review-app-1.0-SNAPSHOT.jar
