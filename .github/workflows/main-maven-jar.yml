name: main-maven-jar.yml
on:
  push:
    branches:
      - 'master-close'
  pull_request:
    branches:
      - 'master-close'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 2

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'  # 你可以选择其他发行版，如 'adopt' 或 'zulu'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean install

      - name: Copy ai-code-review-sdk JAR
        run: mvn dependency:copy -Dartifact=cn.zt:ai-code-review-sdk:1.0-SNAPSHOT -DoutputDirectory=./libs

      - name: Run Code Review
        run: java -jar ./libs/ai-code-review-sdk-1.0-SNAPSHOT.jar
        env:
          GITHUB_TOKEN: ${{secrets.CODE_TOKEN}}

